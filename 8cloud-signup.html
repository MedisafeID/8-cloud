<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — 8Cloud</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --orange:#e8590c;--orange2:#f97316;
  --blue:#3b82f6;--blue2:#60a5fa;--blue3:#2563eb;
  --cyan:#00d4ff;
  --text:#eef4ff;--text2:#b8cfe8;--text3:#7a9bbf;
  --bg:#070e1c;--bg2:#0a1428;--bg3:#0d1830;
  --border:#162338;--border2:#1e3252;
  --nav-h:60px;
  --mono:'IBM Plex Mono',monospace;
  --sans:'Plus Jakarta Sans',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{
  position:sticky;top:0;z-index:200;height:var(--nav-h);
  background:#070e1c;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;gap:1rem;
}
.nav-logo{display:flex;align-items:center;text-decoration:none;flex-shrink:0}
.nav-logo img{height:34px;width:auto;object-fit:contain;display:block}
.nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.btn-sign{padding:7px 16px;border-radius:4px;font-size:13.5px;font-weight:500;color:var(--text2);background:transparent;border:1px solid var(--border2);cursor:pointer;text-decoration:none;transition:border-color .15s;font-family:var(--sans)}
.btn-sign:hover{border-color:#3b82f6;color:var(--text)}

/* MAIN */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem 1rem;position:relative;overflow:hidden}
.main::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(0,212,255,.07),transparent),
             radial-gradient(ellipse 40% 40% at 80% 80%,rgba(59,130,246,.06),transparent);
  pointer-events:none;
}

/* CARD */
.signin-card{
  position:relative;z-index:1;
  width:100%;max-width:420px;
  background:#0a1428;
  border:1px solid var(--border2);
  border-radius:14px;
  padding:2.5rem 2.25rem;
  box-shadow:0 24px 80px rgba(0,0,0,.5);
}
.card-eyebrow{
  font-size:11px;font-weight:600;color:var(--cyan);
  letter-spacing:.12em;text-transform:uppercase;
  font-family:var(--mono);margin-bottom:1rem;text-align:center;
}
.card-title{font-size:26px;font-weight:800;letter-spacing:-.03em;color:#eef4ff;text-align:center;margin-bottom:.4rem}
.card-sub{font-size:14px;color:var(--text3);text-align:center;margin-bottom:2rem;line-height:1.6}
.card-sub a{color:var(--blue2);text-decoration:none;font-weight:500}
.card-sub a:hover{color:#eef4ff}

/* GOOGLE BUTTON */
.btn-social-google{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:13px 20px;border-radius:8px;
  font-size:15px;font-weight:600;cursor:pointer;
  text-decoration:none;font-family:var(--sans);
  color:#fff;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.15);
  transition:all .22s ease;position:relative;overflow:hidden;
  letter-spacing:.01em;box-shadow:0 2px 12px rgba(0,0,0,.3);
  margin-bottom:1.5rem;
}
.btn-social-google::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(66,133,244,.15),rgba(52,168,83,.08));
  opacity:0;transition:opacity .22s;
}
.btn-social-google:hover{background:rgba(255,255,255,.1);border-color:rgba(66,133,244,.6);transform:translateY(-2px);box-shadow:0 8px 28px rgba(66,133,244,.25),0 0 0 1px rgba(66,133,244,.2);color:#fff}
.btn-social-google:hover::before{opacity:1}
.btn-social-google:active{transform:translateY(0);box-shadow:none}
.btn-social-google svg{flex-shrink:0}
.btn-social-google span{position:relative;z-index:1}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:0 0 1.5rem}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:12px;color:var(--text3);font-family:var(--mono);letter-spacing:.05em}

/* FORM */
.form-group{margin-bottom:1.1rem}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:.45rem;letter-spacing:.01em}
.input-wrap{position:relative}
.input-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--text3);pointer-events:none}
input[type="email"],input[type="password"],input[type="text"]{
  width:100%;padding:10px 14px 10px 38px;
  border-radius:6px;background:#070e1c;
  border:1px solid var(--border2);color:var(--text);
  font-size:14px;font-family:var(--sans);outline:none;
  transition:border-color .15s,box-shadow .15s;
}
input::placeholder{color:var(--text3)}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}

.btn-signin{
  width:100%;padding:11px;border-radius:6px;
  font-size:15px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  border:1px solid #1d4ed8;cursor:pointer;
  font-family:var(--sans);
  box-shadow:0 8px 28px rgba(37,99,235,.35);
  transition:all .2s;
}
.btn-signin:hover{background:linear-gradient(135deg,#2563eb,#1d4ed8);box-shadow:0 14px 40px rgba(37,99,235,.45);transform:translateY(-1px)}
.btn-signin:active{transform:translateY(0)}

.signin-row{text-align:center;margin-top:1.5rem;font-size:13.5px;color:var(--text3)}
.signin-row a{color:var(--blue2);text-decoration:none;font-weight:600}
.signin-row a:hover{color:#eef4ff}

/* PASSWORD STRENGTH */
.strength-bar{display:flex;gap:4px;margin-top:6px}
.strength-seg{flex:1;height:3px;border-radius:2px;background:var(--border2);transition:background .3s}
.strength-label{font-size:11px;color:var(--text3);margin-top:4px;font-family:var(--mono)}

/* FOOTER */
footer{padding:1.5rem 2rem;border-top:1px solid var(--border);text-align:center;font-size:12px;color:var(--text3)}
footer a{color:var(--text3);text-decoration:none;margin:0 8px}
footer a:hover{color:var(--text2)}

.error-msg{font-size:13px;color:#f87171;margin-bottom:1rem;text-align:center;display:none}
</style>
</head>

    <!-- FORM -->
    <div class="form-group">
      <label for="fullname">Full name</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input type="text" id="fullname" placeholder="John Smith" autocomplete="name"/>
      </div>
    </div>

    <div class="form-group">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="password" placeholder="Min. 8 characters" autocomplete="new-password" oninput="checkStrength(this.value)"/>
      </div>
      <div class="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
      <div class="strength-label" id="strength-label"></div>
    </div>

      <label for="confirm">Confirm password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="confirm" placeholder="Re-enter password" autocomplete="new-password"/>

async function signUpWithGoogle(e) {
  e.preventDefault();
  const { error } = await _supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/dashboard.html' }
  });
  if (error) showError(error.message);
}

async function handleSignUp() {
  const name = document.getElementById('fullname').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;

  if (!name || !email || !password || !confirm) return showError('Please fill in all fields.');
  if (password.length < 8) return showError('Password must be at least 8 characters.');
  if (password !== confirm) return showError('Passwords do not match.');

  const btn = document.querySelector('.btn-signin');
  btn.textContent = 'Creating account…';
  btn.disabled = true;

  const { data, error } = await _supabase.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });

  if (error) {
    showError(error.message);
    btn.textContent = 'Create Account';
    btn.disabled = false;
  } else {
    btn.textContent = '✓ Check your email!';
    btn.style.background = 'linear-gradient(135deg,#10b981,#059669)';
    document.querySelector('.signin-card').insertAdjacentHTML('beforeend',
      '<p style="text-align:center;color:#6ee7b7;font-size:13.5px;margin-top:1rem">We sent a confirmation link to <strong>' + email + '</strong></p>'
    );
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function checkStrength(val) {
  const segs = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3'), document.getElementById('s4')];
  const label = document.getElementById('strength-label');
  let score = 0;
  if (val.length >= 8) score++;
  if (/[A-Z]/.test(val)) score++;
  if (/[0-9]/.test(val)) score++;
  if (/[^A-Za-z0-9]/.test(val)) score++;
  const colors = ['#ef4444','#f97316','#eab308','#22c55e'];
  const labels = ['Weak','Fair','Good','Strong'];
  segs.forEach((s, i) => s.style.background = i < score ? colors[score-1] : 'var(--border2)');
  label.textContent = val.length ? labels[score-1] || '' : '';
  label.style.color = score > 0 ? colors[score-1] : 'var(--text3)';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignUp(); });
